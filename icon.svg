<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#1a0f3d"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A847"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Grid lines (3x3) -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="2">
    <!-- Vertical -->
    <line x1="176" y1="100" x2="176" y2="412"/>
    <line x1="336" y1="100" x2="336" y2="412"/>
    <!-- Horizontal -->
    <line x1="80" y1="200" x2="432" y2="200"/>
    <line x1="80" y1="312" x2="432" y2="312"/>
  </g>

  <!-- Grid cells (subtle fill to show the grid) -->
  <g fill="#ffffff" fill-opacity="0.06">
    <rect x="80" y="100" width="96" height="100" rx="4"/>
    <rect x="176" y="100" width="160" height="100" rx="4"/>
    <rect x="336" y="100" width="96" height="100" rx="4"/>
    <rect x="80" y="200" width="96" height="112" rx="4"/>
    <rect x="176" y="200" width="160" height="112" rx="4"/>
    <rect x="336" y="200" width="96" height="112" rx="4"/>
    <rect x="80" y="312" width="96" height="100" rx="4"/>
    <rect x="176" y="312" width="160" height="100" rx="4"/>
    <rect x="336" y="312" width="96" height="100" rx="4"/>
  </g>

  <!-- Selected/highlighted cell -->
  <rect x="176" y="200" width="160" height="112" rx="6" fill="#4A90D9" fill-opacity="0.3" stroke="#4A90D9" stroke-opacity="0.7" stroke-width="2"/>

  <!-- Lasso rope - a loose loop swirling around the grid -->
  <g fill="none" stroke="url(#rope)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main lasso loop coming from top-right -->
    <path d="M 420 80 Q 460 120, 440 180 Q 420 240, 380 280 Q 340 320, 280 340 Q 220 360, 160 340 Q 100 320, 80 260 Q 60 200, 100 150 Q 140 100, 200 90 Q 260 80, 320 100 Q 370 120, 390 160"/>
    <!-- Rope tail trailing off -->
    <path d="M 420 80 Q 440 60, 450 40"/>
    <!-- Small loop knot at the end -->
    <circle cx="452" cy="36" r="12" stroke-width="6"/>
  </g>

  <!-- Rope texture highlights -->
  <g fill="none" stroke="#F0D68A" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round">
    <path d="M 425 85 Q 445 115, 435 160"/>
    <path d="M 160 335 Q 110 315, 88 265"/>
  </g>
</svg>
